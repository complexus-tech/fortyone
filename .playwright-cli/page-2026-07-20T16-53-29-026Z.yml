  - generic [ref=e491]:
    - heading "Questions worth answering." [level=2] [ref=e493]
    - generic [ref=e494]:
      - generic [ref=e495]:
        - button "What makes FortyOne different from a task manager?" [expanded] [ref=e496] [cursor=pointer]
        - region "What makes FortyOne different from a task manager?" [ref=e498]:
          - paragraph [ref=e500]: FortyOne connects customer feedback and company goals to the tasks that deliver them. Teams can decide what to build without losing the original request or the reason behind the work.
      - generic [ref=e501]:
        - button "How does customer feedback work?" [ref=e502] [cursor=pointer]
        - region "How does customer feedback work?":
          - paragraph [ref=e505]: Customers can submit requests, vote, and comment in a public portal. Feedback boards route each request to the team that owns the work. The team can review it, close it, or turn it into planned work.
      - generic [ref=e506]:
        - button "What can FortyOne's AI do?" [ref=e507] [cursor=pointer]
        - region "What can FortyOne's AI do?":
          - paragraph [ref=e510]: AI can suggest an owner, fill in an estimate, find time for the work, and surface delivery risk from the project context already in FortyOne.
      - generic [ref=e511]:
        - button "Can we review AI actions before they are applied?" [ref=e512] [cursor=pointer]
        - region "Can we review AI actions before they are applied?":
          - paragraph [ref=e515]: Yes. Teams can review and edit important suggestions before they change the project plan.
      - generic [ref=e516]:
        - button "Is the free plan actually free?" [ref=e517] [cursor=pointer]
        - region "Is the free plan actually free?":
          - paragraph [ref=e520]: Yes. There is no credit card and no trial expiry. The Hobby plan supports one team and up to five members, enough to run a real sprint and decide whether FortyOne should scale with you.
      - generic [ref=e521]:
        - button "Can FortyOne plan around my team's calendar?" [ref=e522] [cursor=pointer]
        - region "Can FortyOne plan around my team's calendar?":
          - paragraph [ref=e525]: Yes. Google Calendar integration lets FortyOne sync availability so AI can recommend better schedules and work windows without storing private event details unnecessarily.
      - generic [ref=e526]:
        - button "Which tools does FortyOne work with?" [ref=e527] [cursor=pointer]
        - region "Which tools does FortyOne work with?":
          - paragraph [ref=e530]: FortyOne works with tools including Google Calendar, Slack, GitHub, GitLab, Figma, and Google Drive. These connections bring availability and source context into the project plan.
