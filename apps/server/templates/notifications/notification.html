{{ define "content" }}
<h1 class="heading" style="{{ emailStyle "heading" }}">{{ .NotificationTitle }}</h1>
<div class="email-body" style="{{ emailStyle "bodyBlock" }}">
  <p class="text" style="{{ emailStyle "text" }}">Hi {{ .UserName }},</p>
  <div class="highlight notification-message" style="{{ emailStyle "notificationPanel" }}">
    {{ safeHTML .NotificationMessage }}
  </div>
  {{ if .NotificationCTAURL }}
  <div class="button-container" style="{{ emailStyle "buttonContainer" }}">
    <a href="{{ .NotificationCTAURL }}" class="button" style="{{ emailStyle "button" }}">{{ .NotificationCTALabel }}</a>
  </div>
  {{ end }}
  {{ if .NotificationsSettingsURL }}
  <div class="secondary-actions" style="{{ emailStyle "secondaryActions" }}">
    <a href="{{ .NotificationsSettingsURL }}" style="{{ emailStyle "secondaryActionLink" }}">Manage notifications</a>
  </div>
  {{ end }}
</div>
{{ end }}
