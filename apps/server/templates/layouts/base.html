{{ define "base" }}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Subject }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: 'Geist';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        mso-font-alt: Arial;
        src: url("https://fonts.gstatic.com/s/geist/v5/gyByhwUxId8gMHweElKvOg.woff2") format("woff2");
      }
      @font-face {
        font-family: 'Geist';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        mso-font-alt: Arial;
        src: url("https://fonts.gstatic.com/s/geist/v5/gyByhwUxId8gMHweElKvOg.woff2") format("woff2");
      }
      @font-face {
        font-family: 'Geist';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        mso-font-alt: Arial;
        src: url("https://fonts.gstatic.com/s/geist/v5/gyByhwUxId8gMHweElKvOg.woff2") format("woff2");
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: #303030;
        font-family: "Geist", Helvetica, Arial, sans-serif;
        font-size: 15px;
        line-height: 1.62;
      }
      a {
        color: inherit;
      }
      .email-shell {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        background-color: #ffffff;
      }
      .email-inner {
        padding: 48px 48px 38px;
      }
      .email-brand {
        display: block;
        margin: 0 0 40px;
      }
      .logo {
        display: block;
        width: auto;
        height: 38px;
        border-radius: 8px;
      }
      .email-eyebrow,
      .eyebrow {
        margin: 0 0 14px;
        color: #6f6c67;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
        text-transform: uppercase;
      }
      .email-title,
      .heading {
        margin: 0;
        max-width: 520px;
        color: #111111;
        font-size: 26px;
        font-weight: 600;
        line-height: 1.16;
      }
      .email-body {
        margin-top: 28px;
      }
      .text,
      .email-body p {
        color: #303030;
        font-size: 15px;
        line-height: 1.62;
        margin: 0 0 18px;
      }
      .email-body p:last-child {
        margin-bottom: 0;
      }
      .email-body strong,
      strong {
        color: #111111;
        font-weight: 600;
      }
      .email-body em,
      em {
        color: #303030;
        font-style: normal;
        font-weight: 500;
      }
      .email-button,
      .button {
        display: inline-block;
        padding: 10px 18px;
        border-radius: 8px;
        background-color: #111111;
        color: #ffffff !important;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.35;
        text-align: center;
        text-decoration: none;
      }
      .email-button:visited,
      .email-button:hover,
      .email-button:active,
      .button:visited,
      .button:hover,
      .button:active {
        color: #ffffff !important;
      }
      .button-container,
      .email-cta-row {
        margin: 30px 0;
      }
      .email-panel,
      .highlight {
        margin: 28px 0;
        padding: 22px 24px;
        border-radius: 8px;
        background-color: #f7f7f7;
      }
      .email-panel.is-quiet {
        margin: 28px 0;
        padding: 22px 0;
        border-top: 1px solid #e5e5e5;
        border-bottom: 1px solid #e5e5e5;
        background-color: transparent;
        border-radius: 0;
      }
      .panel-label,
      .meta {
        margin: 0 0 10px;
        color: #6f6c67;
        font-size: 15px;
        font-weight: 600;
      }
      .email-body .panel-label,
      .email-body .meta {
        margin: 0 0 10px;
        color: #6f6c67;
        font-size: 15px;
        font-weight: 600;
      }
      .panel-title,
      .notification-message h3 {
        margin: 0 0 12px;
        color: #111111;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
      }
      .detail-list {
        display: block;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .detail-row {
        display: block;
        padding: 0 0 10px;
      }
      .detail-row:last-child {
        padding-bottom: 0;
      }
      .detail-label {
        display: inline-block;
        min-width: 116px;
        color: #6f6c67;
        font-size: 15px;
      }
      .detail-value {
        color: #111111;
        font-size: 15px;
        font-weight: 500;
      }
      .code-panel {
        margin: 28px 0;
        padding: 24px;
        border-radius: 8px;
        background-color: #f7f7f7;
      }
      .code-panel.is-centered {
        text-align: center;
      }
      .verification-code {
        margin: 0;
        color: #111111;
        font-family: "SFMono-Regular", "Roboto Mono", Consolas, "Liberation Mono",
          monospace;
        font-size: 30px;
        font-weight: 600;
        line-height: 1.1;
      }
      .email-body .verification-code {
        margin: 0;
        color: #111111;
        font-family: "SFMono-Regular", "Roboto Mono", Consolas, "Liberation Mono",
          monospace;
        font-size: 30px;
        font-weight: 600;
        line-height: 1.1;
      }
      .security-note {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid #e5e5e5;
        color: #6f6c67;
        font-size: 15px;
      }
      .email-body .security-note {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid #e5e5e5;
        color: #6f6c67;
        font-size: 15px;
      }
      .secondary-actions {
        margin-top: 32px;
        margin-bottom: 42px;
      }
      .secondary-actions a {
        color: #6f6c67;
        font-size: 15px;
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }
      .workspace-link-panel .panel-label,
      .workspace-link-panel .meta {
        margin-bottom: 4px;
      }
      .email-body .workspace-link-panel .panel-label,
      .email-body .workspace-link-panel .meta {
        margin-bottom: 4px;
      }
      .workspace-link {
        display: inline-block;
        overflow-wrap: anywhere;
        color: #111111;
        font-size: 15px;
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }
      .notification-message p {
        margin: 0 0 12px;
        color: #303030;
        font-size: 15px;
        line-height: 1.62;
      }
      .notification-message p:last-child {
        margin-bottom: 0;
      }
      .notification-message ul {
        margin: 0 0 12px;
        padding: 0;
        list-style: none;
      }
      .notification-message ul.notification-sublist {
        margin: 6px 0 12px;
        padding: 0;
      }
      .notification-message li {
        padding: 10px 0;
        border-top: 1px solid #e5e5e5;
        color: #303030;
        font-size: 15px;
        line-height: 1.5;
      }
      .notification-message li.notification-subitem {
        padding: 8px 0;
        border-top: 0;
        color: #6f6c67;
        font-size: 15px;
      }
      .notification-message li:last-child {
        padding-bottom: 0;
      }
      .notification-message a {
        color: #111111;
      }
      .email-footer {
        margin-top: 46px;
        padding-top: 26px;
        border-top: 1px solid #e5e5e5;
        color: #6f6c67;
        font-size: 15px;
        line-height: 1.5;
      }
      .email-footer p {
        font-size: 14px;
        margin: 0 0 6px;
      }
      .email-footer p:last-child {
        margin-bottom: 0;
      }
      .divider {
        height: 1px;
        background: #e5e5e5;
        margin: 24px 0;
      }
      .list {
        color: #303030;
        margin: 0 0 16px;
      }
      @media only screen and (max-width: 600px) {
        .email-inner {
          padding: 34px 24px 30px;
        }
        .email-brand {
          margin-bottom: 32px;
        }
        .email-title,
        .heading {
          font-size: 23px;
        }
        .email-button,
        .button {
          display: block;
          width: 100%;
          box-sizing: border-box;
        }
        .detail-label {
          display: block;
          min-width: 0;
          margin-bottom: 4px;
        }
      }
    </style>
  </head>
  <body style="{{ emailStyle "body" }}">
    <div class="email-shell" style="{{ emailStyle "shell" }}">
      <div class="email-inner" style="{{ emailStyle "inner" }}">
        <div class="email-brand" style="{{ emailStyle "brand" }}">
          <img src="{{ .LogoURL }}" alt="{{ .CompanyName }}" class="logo" style="{{ emailStyle "logo" }}" />
        </div>
        {{ template "content" . }}
        <div class="email-footer" style="{{ emailStyle "footer" }}">
          <p style="{{ emailStyle "footerText" }}">{{ .CompanyName }} by Complexus LLC</p>
          <p style="{{ emailStyle "footerTextLast" }}">&copy; {{ .Year }} Complexus LLC. All rights reserved.</p>
        </div>
      </div>
    </div>
  </body>
</html>
{{ end }}
